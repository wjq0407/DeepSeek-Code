name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - name: Typecheck (tsc --noEmit, strict)
        run: npm run typecheck
      - name: Unit tests (node:test, no API key required)
        run: npm test
